name: output between jobs

on:
    workflow_dispatch:

jobs:
    output-job1:
        runs-on: ubuntu-latest
        outputs:
            app_version: ${{ steps.job1.outputs.ver }}
        steps:
            - name: sets output
              id: job1
              run: echo "ver=1.0.0" >> $GITHUB_OUTPUT
    output-job2:
        runs-on: ubuntu-latest
        needs: output-job1
        steps:
            - name: Printing the output (Version)
              run: echo "Version is ${{ needs.output-job1.outputs.app_version }}"
            
        