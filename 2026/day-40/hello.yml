on: 
  push:
    branches: [main]

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Printing hello-world
        run: echo "Hello from Github Actions"
      - name: set current date and time
        run:  echo "todays date and time is $(date)"
      - name: printing repo name
        run:  echo "Repo name is ${{ github.repository }}"
      - name: Printing branch name which pushed the code
        run:  echo 'branch triggering workflow is ${{ github.ref_name }}'
      - name: listing all files in repo
        run: ls -R
      - name: printing runner OS
        run: echo "This job is running on ${{ runner.os }}"
