name: matrix-trigger

on:
    workflow_dispatch:

jobs:
    matrix-workflow:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.10", "3.11", "3.12"]
                os: [ubuntu-latest, windows-latest]
                exclude:
                - python-version: 3.10
                  os: windows-latest 
        steps:
            - name: code checkout
              uses: actions/checkout@v4
            - name: install python
              uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version }}
